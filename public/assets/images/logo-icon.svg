<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400" role="img" aria-label="NEXUS ERP premium animated logo">
  <title>NEXUS ERP</title>
  <defs>
    <!-- Premium multi-stop gradient (violet → magenta → cyan) -->
    <linearGradient id="nexusGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#a78bfa"/>
      <stop offset="35%"  stop-color="#8b5cf6"/>
      <stop offset="65%"  stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#22d3ee"/>
      <animate attributeName="x1" values="0%;100%;0%" dur="6s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="100%;0%;100%" dur="6s" repeatCount="indefinite"/>
    </linearGradient>

    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#a78bfa" stop-opacity="0"/>
      <stop offset="50%"  stop-color="#ec4899" stop-opacity="1"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </linearGradient>

    <linearGradient id="faceGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  stop-color="#8b5cf6" stop-opacity="0.95"/>
      <stop offset="50%" stop-color="#7c3aed" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#ec4899" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="faceGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  stop-color="#6d28d9" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#4c1d95" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="faceGrad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  stop-color="#a855f7" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0.85"/>
    </linearGradient>

    <linearGradient id="shineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="50%"  stop-color="#ffffff" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>

    <radialGradient id="halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#a78bfa" stop-opacity="0.55"/>
      <stop offset="60%" stop-color="#ec4899" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>

    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="10"/>
    </filter>

    <!-- Reusable cube -->
    <symbol id="cube" viewBox="-100 -100 200 200" overflow="visible">
      <!-- back / left faces (darker) -->
      <polygon points="-60,-60 60,-60 80,-40 -40,-40" fill="url(#faceGrad2)" opacity="0.8"/>
      <polygon points="-60,-60 -40,-40 -40,80 -60,60" fill="url(#faceGrad2)" opacity="0.7"/>
      <!-- front face -->
      <rect x="-60" y="-60" width="120" height="120" rx="10" fill="url(#faceGrad)" stroke="#ffffff" stroke-opacity="0.35" stroke-width="1.5"/>
      <!-- right side (3d edge) -->
      <polygon points="60,-60 80,-40 80,80 60,60" fill="url(#faceGrad3)" opacity="0.95"/>
      <polygon points="60,60 80,80 -40,80 -60,60" fill="url(#faceGrad2)" opacity="0.85"/>
      <!-- inner frame -->
      <rect x="-52" y="-52" width="104" height="104" rx="6" fill="none" stroke="#ffffff" stroke-opacity="0.18"/>
      <!-- letter -->
      <text x="0" y="18" text-anchor="middle" font-family="'Orbitron','Space Grotesk',ui-sans-serif,system-ui" font-weight="900" font-size="76" fill="#ffffff" style="filter:url(#glow)">N</text>
      <!-- shine sweep -->
      <g clip-path="inset(0 round 10px)">
        <rect x="-140" y="-60" width="60" height="120" fill="url(#shineGrad)" transform="skewX(-20)">
          <animate attributeName="x" values="-140;140;140" keyTimes="0;0.6;1" dur="4s" repeatCount="indefinite"/>
        </rect>
      </g>
    </symbol>
  </defs>

  <!-- Everything uses currentColor-friendly fills where possible; bg stays transparent -->
  <g transform="translate(180 200)">
    <!-- soft halo (transparent-friendly) -->
    <circle r="120" fill="url(#halo)" filter="url(#softGlow)">
      <animate attributeName="r" values="115;130;115" dur="4s" repeatCount="indefinite"/>
    </circle>

    <!-- Orbiting rings -->
    <g fill="none" stroke="url(#ringGrad)" stroke-width="2" opacity="0.95">
      <ellipse cx="0" cy="0" rx="110" ry="110">
        <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="9s" repeatCount="indefinite"/>
      </ellipse>
      <ellipse cx="0" cy="0" rx="95" ry="34">
        <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="7s" repeatCount="indefinite"/>
      </ellipse>
      <ellipse cx="0" cy="0" rx="34" ry="95">
        <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="11s" repeatCount="indefinite"/>
      </ellipse>
    </g>

    <!-- Orbiting satellites -->
    <g>
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="6s" repeatCount="indefinite"/>
      <circle cx="0" cy="-110" r="5" fill="#a78bfa" filter="url(#glow)"/>
    </g>
    <g>
      <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="8s" repeatCount="indefinite"/>
      <circle cx="110" cy="0" r="4" fill="#ec4899" filter="url(#glow)"/>
    </g>
    <g>
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="10s" repeatCount="indefinite"/>
      <circle cx="0" cy="95" r="3.5" fill="#22d3ee" filter="url(#glow)"/>
    </g>

    <!-- Cube (tilt + bob) -->
    <g>
      <animateTransform attributeName="transform" type="translate" values="0,0; 0,-8; 0,0" dur="5s" repeatCount="indefinite"/>
      <g>
        <animateTransform attributeName="transform" type="rotate" values="-6;6;-6" dur="6s" repeatCount="indefinite"/>
        <use href="#cube" x="-100" y="-100" width="200" height="200"/>
      </g>
    </g>

    <!-- Soft ground shadow (transparent-safe) -->
    <ellipse cx="0" cy="128" rx="70" ry="6" fill="#8b5cf6" opacity="0.35" filter="url(#softGlow)">
      <animate attributeName="rx" values="70;50;70" dur="5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.35;0.15;0.35" dur="5s" repeatCount="indefinite"/>
    </ellipse>
  </g>

  <!-- Wordmark -->
  <g transform="translate(340 200)" font-family="'Orbitron','Space Grotesk',ui-sans-serif,system-ui">
    <!-- eyebrow -->
    <g transform="translate(0 -78)">
      <rect x="0" y="0" width="196" height="22" rx="11" fill="none" stroke="url(#nexusGrad)" stroke-opacity="0.6"/>
      <circle cx="14" cy="11" r="3.5" fill="#34d399">
        <animate attributeName="opacity" values="1;0.35;1" dur="2s" repeatCount="indefinite"/>
      </circle>
      <text x="28" y="15" font-size="10" letter-spacing="4" font-weight="700" fill="url(#nexusGrad)">ENTERPRISE SUITE · v2026</text>
    </g>

    <!-- NEXUS -->
    <text x="0" y="0" font-size="82" font-weight="900" letter-spacing="6" fill="url(#nexusGrad)" filter="url(#glow)">
      NEXUS
    </text>
    <!-- Animated shine over text -->
    <g clip-path="inset(0)">
      <text x="0" y="0" font-size="82" font-weight="900" letter-spacing="6" fill="url(#shineGrad)">NEXUS
        <animate attributeName="opacity" values="0.2;0.9;0.2" dur="3.5s" repeatCount="indefinite"/>
      </text>
    </g>

    <!-- ERP pill -->
    <g transform="translate(0 26)">
      <rect x="0" y="0" width="132" height="34" rx="17" fill="url(#faceGrad)" fill-opacity="0.25" stroke="url(#nexusGrad)" stroke-opacity="0.75" stroke-width="1.4"/>
      <text x="66" y="23" text-anchor="middle" font-size="18" font-weight="800" letter-spacing="10" fill="url(#nexusGrad)">ERP</text>
    </g>

    <!-- Tagline -->
    <text x="0" y="90" font-family="'Space Grotesk',ui-sans-serif" font-size="11" letter-spacing="6" font-weight="600" fill="url(#nexusGrad)" opacity="0.9">
      ENTERPRISE · INTELLIGENCE · FLOW
    </text>
  </g>
</svg>
